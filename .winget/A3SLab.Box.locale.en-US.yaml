ShortDescription: MicroVM sandbox runtime with native Windows WHPX support
Description: |-
  a3s-box is a Docker-like MicroVM runtime for Linux OCI workloads. The Windows
  package runs natively on Windows through libkrun's Windows Hypervisor Platform
  (WHPX) backend; it does not require WSL.

  Key features:
  - Native Windows Hypervisor Platform (WHPX) backend
  - Bundled a3s-box CLI, shim, Linux guest init, and krun.dll
  - Docker-like run/create/start/logs/image workflows on Windows
  - Named-pipe host/guest control channel for WHPX guests
  - Windows CRI is not supported

  Requirements:
  - Windows 10/11 x64 with Windows Hypervisor Platform enabled
  - Run: Enable-WindowsOptionalFeature -Online -FeatureName HypervisorPlatform
Moniker: a3s-box
Tags:
- microvm
- virtualization
- container
- whpx
- hypervisor
- sandbox
- libkrun
ReleaseNotes: |-
  Windows packaging uses the native WHPX backend. The package includes the
  Windows a3s-box CLI, the Windows shim, the Linux guest-init binary that runs
  inside the MicroVM, and krun.dll.

  Windows boundaries:
  - Requires Windows Hypervisor Platform.
  - Does not require WSL.
  - Windows CRI is unsupported.
