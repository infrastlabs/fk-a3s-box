  release:
    name: GitHub Release
    # needs: [build, build-windows]
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create release
        uses: softprops/action-gh-release@v2
        # id: new_release
        with:
          # name: ${{ github.ref_name }}
          # name: latest
          name: latest-deb9
          tag_name: v26.06
          make_latest: true
          token: ${{ github.token }} #Defaults to ${{ github.token }}
          # body: |
          #   Automated release-2026 for tag ${{ github.ref }}          
          # append_body
          # draft: false
          # prerelease: false
          # preserve_order: true
          # fail_on_unmatched_files: false
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip

