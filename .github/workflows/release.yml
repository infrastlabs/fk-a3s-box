  # ── Build matrix ───────────────────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    # needs: test
    strategy:
      matrix:
        include:
          - target: linux-x86_64
            os: ubuntu-22.04 #latest
            rust_target: x86_64-unknown-linux-musl
            guest_target: x86_64-unknown-linux-musl
            build_cri: true
          # - target: linux-arm64
          #   os: ubuntu-24.04-arm
          #   rust_target: aarch64-unknown-linux-musl
          #   guest_target: aarch64-unknown-linux-musl
          #   build_cri: true
          # - target: macos-arm64
          #   os: macos-14
          #   rust_target: ""
          #   guest_target: aarch64-unknown-linux-musl
          #   build_cri: false

    runs-on: ${{ matrix.os }}
      # image: debian:stretch
        # core-debian-9/10/11 #deb9:bad glibc for node10; deb10:rust.build.crate-err
        # core-ubuntu-16/18/20/22 #ubt22:ok; 
      # glib2.28@deb10 [2.31@ubt20; 2.31@same.deb11]
        # ubt26-2.43|ubt24-2.39|ubt22-2.35|ubt20-2.31|ubt18-2.27|ubt16-2.23|ubt14-2.19
        # deb13-2.41|deb12-2.36|deb11-2.31|deb10-2.28|deb9-2.24|deb8-2.19@2015
    # container:
    #   image: registry.cn-shenzhen.aliyuncs.com/infrastlabs/x11-base:core-ubuntu-22.04; #core-debian-10 deb9
    #   # image: infrastlabs/x11-base:core-ubuntu-18.04; #core-debian-10 deb9
    #   # --network host err: --network github_network_d8751a64d59f4356a176883d2cf5adf7 --network host --privileged
    #   options: --privileged
    steps:
      - name: Init git
        run: |
          apt.sh git;
          # INFO
          pwd && ls -l
          docker version
          free -h; df -h; ip a |grep inet; uname -a;
          docker image prune -a -f; df -h
      # - uses: actions/checkout@v4 #v4.node20.glibcErr >v2; 还是node20:得glib2.28@deb10 [2.31@ubt20]
      - name: Checkout code manually
        run: |
          git clone https://github.com/${{ github.repository }} .
          git checkout ${{ github.sha }}

      - name: Init submodules
        run: |
          git config --global --add safe.directory /__w/fk-a3s-box/fk-a3s-box
          git -c http.extraheader= submodule update --init --recursive
          # 
          # https://www.tutorialpedia.org/blog/how-do-i-deal-with-certificates-using-curl-while-trying-to-access-an-https-url/
          # update-ca-certificates #for rust-toolchain's curl, 加上后还不行(deb10/11, ubt10)
          # https://curl.se/docs/caextract.html
          cd /etc/ssl/certs; curl -O -k -fSL https://curl.se/ca/cacert-2026-05-14.pem
          ls -lh
          update-ca-certificates
          # 
          # replace the static's curl
          apt update
          apt -y install --reinstall curl

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.guest_target }}
      # - name: Install Rust via rustup(dseek) #carge not find in next step
      #   run: |
      #     wget --no-check-certificate https://sh.rustup.rs -O rustup-init.sh
      #     sh rustup-init.sh -y
      #     source $HOME/.cargo/env

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config libssl-dev \
            musl-tools libclang-dev patchelf protobuf-compiler

      # - name: Install dependencies (macOS)
      #   if: runner.os == 'macOS'
      #   run: |
      #     brew install lld llvm protobuf
      #     pip3 install --break-system-packages ziglang
      #     cargo install cargo-zigbuild

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src
          key: release-${{ matrix.target }}

      - name: Build host binaries
        run: |
          cd src
          cargo build --release -p a3s-box-cli -p a3s-box-shim
          if [ "${{ matrix.build_cri }}" = "true" ]; then
            cargo build --release -p a3s-box-cri
          fi

      - name: Build guest binaries
        run: |
          cd src
          if [ "${{ runner.os }}" = "macOS" ]; then
            cargo zigbuild --release \
              -p a3s-box-guest-init \
              --target ${{ matrix.guest_target }}
          else
            cargo build --release \
              -p a3s-box-guest-init \
              --target ${{ matrix.guest_target }}
          fi

      - name: Package release
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          DIR="a3s-box-${TAG}-${{ matrix.target }}"
          mkdir -p "$DIR/lib"

          cp src/target/release/a3s-box "$DIR/"
          cp src/target/release/a3s-box-shim "$DIR/"

          if [ "${{ matrix.build_cri }}" = "true" ]; then
            cp src/target/release/a3s-box-cri "$DIR/"
          fi

          cp "src/target/${{ matrix.guest_target }}/release/a3s-box-guest-init" "$DIR/"

          # Find and copy libkrun/libkrunfw shared libraries from build output
          BUILD_DIR=$(find src/target/release/build -name "out" -path "*libkrun*" -type d | head -1)
          if [ -n "$BUILD_DIR" ]; then
            find "$BUILD_DIR" -name "libkrun*" \( -name "*.dylib" -o -name "*.so*" \) -exec cp {} "$DIR/lib/" \;
            find "$BUILD_DIR" -name "libkrunfw*" \( -name "*.dylib" -o -name "*.so*" \) -exec cp {} "$DIR/lib/" \;
          fi

          # Fix rpath for macOS binaries to look in ../lib relative to bin
          if [ "${{ runner.os }}" = "macOS" ]; then
            for bin in "$DIR/a3s-box" "$DIR/a3s-box-shim"; do
              install_name_tool -add_rpath @executable_path/../lib "$bin" 2>/dev/null || true
              install_name_tool -add_rpath @executable_path/lib "$bin" 2>/dev/null || true
            done
          fi

          # Fix rpath for Linux binaries
          if [ "${{ runner.os }}" = "Linux" ]; then
            for bin in "$DIR/a3s-box" "$DIR/a3s-box-shim"; do
              patchelf --set-rpath '$ORIGIN/lib' "$bin" 2>/dev/null || true
            done
            if [ "${{ matrix.build_cri }}" = "true" ]; then
              patchelf --set-rpath '$ORIGIN/lib' "$DIR/a3s-box-cri" 2>/dev/null || true
            fi
          fi

          cp README.md "$DIR/" 2>/dev/null || true
          cp LICENSE "$DIR/" 2>/dev/null || true

          # List package contents
          echo "Package contents:"
          ls -lhR "$DIR/"

          tar czf "${DIR}.tar.gz" "$DIR"
          echo "ASSET=${DIR}.tar.gz" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ASSET }}

